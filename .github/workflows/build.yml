name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: ClaudeExportChinese-macos
          - name: Windows
            os: windows-latest
            artifact: ClaudeExportChinese-windows
          - name: Linux
            os: ubuntu-latest
            artifact: ClaudeExportChinese-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        run: uv sync

      - name: Build application
        run: uv run --with pyinstaller pyinstaller --noconfirm --clean --windowed --name ClaudeExportChinese main.py

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/ClaudeExportChinese.app ${{ matrix.artifact }}.zip

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/ClaudeExportChinese -DestinationPath ${{ matrix.artifact }}.zip

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C dist ClaudeExportChinese

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
