name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: ClaudeExportChinese-macos
            package: ClaudeExportChinese-macos.zip
          - name: Windows
            os: windows-latest
            artifact: ClaudeExportChinese-windows
            package: ClaudeExportChinese-windows.zip
          - name: Linux
            os: ubuntu-latest
            artifact: ClaudeExportChinese-linux
            package: ClaudeExportChinese-linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        run: uv sync

      - name: Build application
        run: uv run --with pyinstaller pyinstaller --noconfirm --clean --windowed --name ClaudeExportChinese main.py

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/ClaudeExportChinese.app ${{ matrix.package }}

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/ClaudeExportChinese -DestinationPath ${{ matrix.package }}

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.package }} -C dist ClaudeExportChinese

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.package }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
